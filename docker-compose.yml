services:
    app:
        build: .
        container_name: ai-support-api
        ports:
            - "8000:8000"
        env_file:
            - .env
        depends_on:
            - mysql

    mysql:
        image: mysql:8.4
        container_name: ai-support-db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: password
            MYSQL_DATABASE: laravel
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql

volumes:
    mysql_data:
